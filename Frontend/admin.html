<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QuantumTech | Panel Admin</title>
    
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        
        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            background: white;
            transition: 0.3s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .product-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .admin-only {
            display: none;
        }
        
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .pagination {
            justify-content: center;
            margin-top: 20px;
        }
        
        .product-actions {
            margin-top: auto;
            display: flex;
            gap: 5px;
        }
        
        .product-actions button {
            flex: 1;
        }
    </style>

    <!-- VERIFICAR SESIÓN Y ROL -->
    <script>
        (function() {
            const usuario = localStorage.getItem('usuario');
            if (!usuario) {
                window.location.href = 'login.html';
            } else {
                const user = JSON.parse(usuario);
                if (user.rol !== 'Administrador') {
                    alert('Acceso denegado. Solo administradores.');
                    window.location.href = 'index.html';
                }
            }
        })();
    </script>
</head>

<body>
    <header>
        <div class="header">
            <div class="container">
                <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                    <a class="navbar-brand font-weight-bold text-info" href="index.html">QuantumTech</a>
                    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ml-auto">
                            <li class="nav-item">
                                <a class="nav-link" href="index.html">Inicio</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" href="admin.html">Panel Admin</a>
                            </li>
                            <li class="nav-item">
                                <a class="btn btn-info ml-lg-3 mt-2 mt-lg-0" href="carrito.html">
                                    🛒 Carrito (<span id="cart-count">0</span>)
                                </a>
                            </li>
                            <li class="nav-item ml-lg-2" id="user-info">
                                <!-- Aquí irá la info del usuario -->
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            
            <!-- Estadísticas -->
            <div class="row">
                <div class="col-md-4">
                    <div class="stats-card">
                        <h3 id="total-productos">0</h3>
                        <p>Total Productos</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stats-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                        <h3 id="precio-promedio">$0</h3>
                        <p>Precio Promedio</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stats-card" style="background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);">
                        <h3 id="producto-caro">$0</h3>
                        <p>Producto más caro</p>
                    </div>
                </div>
            </div>
            
            <!-- Barra de búsqueda y acciones -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="search-box">
                        <input type="text" class="form-control" id="searchInput" placeholder="🔍 Buscar productos...">
                    </div>
                </div>
                <div class="col-md-6 text-right">
                    <button class="btn btn-success" onclick="showAddProductModal()">
                        <i class="fa fa-plus"></i> Agregar Producto
                    </button>
                    <button class="btn btn-warning" onclick="generar30Productos()">
                        <i class="fa fa-magic"></i> Generar 30 productos
                    </button>
                </div>
            </div>
            
            <!-- Lista de productos -->
            <div id="products-list" class="row">
                <!-- Los productos se cargarán aquí dinámicamente -->
            </div>
            
            <!-- Paginación -->
            <nav aria-label="Page navigation">
                <ul class="pagination" id="pagination">
                    <!-- Se generará dinámicamente -->
                </ul>
            </nav>
        </div>
    </section>

    <!-- Modal para agregar/editar producto -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title" id="modalTitle">Agregar Producto</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="productId">
                        <div class="form-group">
                            <label>Nombre del producto</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="form-group">
                            <label>Precio (COP)</label>
                            <input type="number" class="form-control" id="productPrice" required>
                        </div>
                        <div class="form-group">
                            <label>URL de la imagen</label>
                            <select class="form-control" id="productImage" required>
                                <option value="images/product1.png">Producto 1</option>
                                <option value="images/product2.png">Producto 2</option>
                                <option value="images/product3.png">Producto 3</option>
                                <option value="images/product4.png">Producto 4</option>
                                <option value="images/product5.png">Producto 5</option>
                                <option value="images/product6.png">Producto 6</option>
                                <option value="images/product7.png">Producto 7</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-info btn-block">Guardar Producto</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-light py-4 text-center">
        <div class="container">
            <h5 class="text-info">QuantumTech</h5>
            <p>Innovación y rendimiento tecnológico</p>
            <p>© 2026 Todos los derechos reservados</p>
        </div>
    </footer>

    <script src="js/jquery.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>

    <script>
        // Variables para paginación
        let currentPage = 1;
        let productsPerPage = 9;
        let filteredProducts = [];

        // Cargar productos del localStorage
        function getProducts() {
            const defaultProducts = [
                { id: 1, name: "Teclado Tipo Gamer", price: 230000, image: "images/product1.png" },
                { id: 2, name: "Mouse Gamer 16000 DPI", price: 120000, image: "images/product2.png" },
                { id: 3, name: "Camara PRO WEB", price: 450000, image: "images/product3.png" },
                { id: 4, name: "Parlantes Sonoros BASS", price: 1200000, image: "images/product4.png" },
                { id: 5, name: "Router v4", price: 320000, image: "images/product5.png" },
                { id: 6, name: "NVMe 1TB HDD Toshiba", price: 180000, image: "images/product6.png" },
                { id: 7, name: "Memoria RAM Crucial DDR3 8 GB", price: 260000, image: "images/product7.png" }
            ];
            
            let products = JSON.parse(localStorage.getItem("products"));
            if (!products || products.length === 0) {
                products = defaultProducts;
                localStorage.setItem("products", JSON.stringify(products));
            }
            return products;
        }

        // Guardar productos
        function saveProducts(products) {
            localStorage.setItem("products", JSON.stringify(products));
            // Disparar evento para que index.html se actualice
            window.dispatchEvent(new Event('storage'));
        }

        // Generar 30 productos automáticamente
        function generar30Productos() {
            const categorias = ["Teclado", "Mouse", "Cámara", "Parlante", "Router", "Disco SSD", "Memoria RAM", "Monitor", "Silla", "Auriculares"];
            const marcas = ["Logitech", "Redragon", "HyperX", "Corsair", "Razer", "Kingston", "SanDisk", "LG", "Samsung", "MSI"];
            const adjetivos = ["Gamer", "Profesional", "Inalámbrico", "RGB", "Ultra", "Pro", "Elite", "Básico", "Premium", "Portátil"];
            
            let productos = [];
            let id = 1;
            
            for (let i = 0; i < 30; i++) {
                const categoria = categorias[Math.floor(Math.random() * categorias.length)];
                const marca = marcas[Math.floor(Math.random() * marcas.length)];
                const adjetivo = adjetivos[Math.floor(Math.random() * adjetivos.length)];
                const precio = [120000, 230000, 450000, 320000, 180000, 260000, 89000, 150000, 520000, 78000][Math.floor(Math.random() * 10)];
                
                productos.push({
                    id: id++,
                    name: `${marca} ${adjetivo} ${categoria}`,
                    price: precio,
                    image: `images/product${(i % 7) + 1}.png`
                });
            }
            
            saveProducts(productos);
            filteredProducts = productos;
            currentPage = 1;
            renderAdminProducts();
            updateStats();
            alert('✅ 30 productos generados exitosamente');
        }

        // Renderizar productos con paginación
        function renderAdminProducts() {
            const products = getProducts();
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            // Filtrar productos
            filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(searchTerm) ||
                p.price.toString().includes(searchTerm)
            );
            
            // Calcular paginación
            const totalPages = Math.ceil(filteredProducts.length / productsPerPage);
            const start = (currentPage - 1) * productsPerPage;
            const end = start + productsPerPage;
            const productsToShow = filteredProducts.slice(start, end);
            
            // Renderizar productos
            const container = document.getElementById("products-list");
            container.innerHTML = "";
            
            if (productsToShow.length === 0) {
                container.innerHTML = '<div class="col-12 text-center"><p class="text-muted">No hay productos para mostrar</p></div>';
            } else {
                productsToShow.forEach(product => {
                    container.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="product-card">
                                <img src="${product.image}" class="product-image" alt="${product.name}">
                                <h5 class="mt-2">${product.name}</h5>
                                <p class="text-primary font-weight-bold">$${product.price.toLocaleString()} COP</p>
                                <div class="product-actions">
                                    <button class="btn btn-warning btn-sm" onclick="editProduct(${product.id})">
                                        <i class="fa fa-edit"></i> Editar
                                    </button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteProduct(${product.id})">
                                        <i class="fa fa-trash"></i> Eliminar
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            // Renderizar paginación
            renderPagination(totalPages);
            updateStats();
        }

        // Renderizar paginación
        function renderPagination(totalPages) {
            let paginationHtml = '';
            
            if (currentPage > 1) {
                paginationHtml += `<li class="page-item"><a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Anterior</a></li>`;
            }
            
            for (let i = 1; i <= totalPages; i++) {
                paginationHtml += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
                </li>`;
            }
            
            if (currentPage < totalPages) {
                paginationHtml += `<li class="page-item"><a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Siguiente</a></li>`;
            }
            
            document.getElementById('pagination').innerHTML = paginationHtml;
        }

        // Cambiar página
        function changePage(page) {
            currentPage = page;
            renderAdminProducts();
        }

        // Actualizar estadísticas
        function updateStats() {
            const products = getProducts();
            
            // Total productos
            document.getElementById('total-productos').textContent = products.length;
            
            // Precio promedio
            if (products.length > 0) {
                const total = products.reduce((sum, p) => sum + p.price, 0);
                const promedio = total / products.length;
                document.getElementById('precio-promedio').textContent = '$' + Math.round(promedio).toLocaleString();
                
                // Producto más caro
                const masCaro = Math.max(...products.map(p => p.price));
                document.getElementById('producto-caro').textContent = '$' + masCaro.toLocaleString();
            }
        }

        // Mostrar modal para agregar producto
        function showAddProductModal() {
            document.getElementById("modalTitle").textContent = "Agregar Producto";
            document.getElementById("productId").value = "";
            document.getElementById("productForm").reset();
            $('#productModal').modal('show');
        }

        // Editar producto
        function editProduct(id) {
            const products = getProducts();
            const product = products.find(p => p.id === id);
            
            document.getElementById("modalTitle").textContent = "Editar Producto";
            document.getElementById("productId").value = product.id;
            document.getElementById("productName").value = product.name;
            document.getElementById("productPrice").value = product.price;
            document.getElementById("productImage").value = product.image;
            
            $('#productModal').modal('show');
        }

        // Eliminar producto
        function deleteProduct(id) {
            if (confirm("¿Estás seguro de eliminar este producto?")) {
                let products = getProducts();
                products = products.filter(p => p.id !== id);
                saveProducts(products);
                renderAdminProducts();
            }
        }

        // Guardar producto (nuevo o editado)
        document.getElementById("productForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const id = document.getElementById("productId").value;
            const products = getProducts();
            
            const productData = {
                name: document.getElementById("productName").value,
                price: parseInt(document.getElementById("productPrice").value),
                image: document.getElementById("productImage").value
            };
            
            if (id) {
                // Editar existente
                const index = products.findIndex(p => p.id == id);
                products[index] = { ...products[index], ...productData };
            } else {
                // Agregar nuevo
                const newId = Math.max(...products.map(p => p.id), 0) + 1;
                products.push({ id: newId, ...productData });
            }
            
            saveProducts(products);
            $('#productModal').modal('hide');
            renderAdminProducts();
        });

        // Búsqueda en tiempo real
        document.getElementById('searchInput').addEventListener('keyup', function() {
            currentPage = 1;
            renderAdminProducts();
        });

        // Mostrar info del usuario
        document.addEventListener("DOMContentLoaded", function() {
            const userData = JSON.parse(localStorage.getItem("usuario"));
            document.getElementById("user-info").innerHTML = `
                <span class="text-white mr-2">
                    <i class="fa fa-user"></i> ${userData.email} (${userData.rol})
                </span>
                <button class="btn btn-danger btn-sm" onclick="logout()">
                    Salir
                </button>
            `;
            
            renderAdminProducts();
            updateCartCount();
        });

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            let total = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById("cart-count").textContent = total;
        }

        function logout() {
            localStorage.clear();   // elimina todo lo guardado en localStorage
            sessionStorage.clear(); // elimina todo lo guardado en sessionStorage
            window.location.href = "login.html";
        }
    </script>
</body>

</html>
