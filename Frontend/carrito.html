<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">

   <title>QuantumTech | Carrito</title>

   <link rel="stylesheet" href="css/bootstrap.min.css">
   <link rel="stylesheet" href="css/style.css">
   <link rel="stylesheet" href="css/responsive.css">
   <style>
      body {
         background-color: #e6f2ff;
      }

      .table img {
         width: 80px;
         height: auto;
         border-radius: 8px;
      }
   </style>
</head>

<body class="main-layout">

   <!-- HEADER -->
   <header>
      <div class="header">
         <div class="container">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
               <a class="navbar-brand font-weight-bold text-info" href="index.html">QuantumTech</a>

               <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                  <span class="navbar-toggler-icon"></span>
               </button>

               <div class="collapse navbar-collapse" id="navbarNav">
                  <ul class="navbar-nav ml-auto">
                     <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                     <li class="nav-item">
                        <a class="btn btn-info ml-lg-3 mt-2 mt-lg-0" href="carrito.html">
                           🛒 Carrito
                        </a>
                     </li>
                  </ul>
               </div>
            </nav>
         </div>
      </div>
   </header>


<script>
    function checkLoginInCarrito() {
        const userData = localStorage.getItem("usuario");
        if (userData) {
            const user = JSON.parse(userData);
            // Buscar el contenedor del botón de login (como no hay, puedes agregarlo)
            // O simplemente mostrar un mensaje de bienvenida
            const headerRight = document.querySelector('.navbar-nav.ml-auto');
            if (headerRight) {
                // Eliminar el botón de login si existe
                const loginBtn = headerRight.querySelector('[data-target="#loginModal"]');
                if (loginBtn) {
                    loginBtn.parentElement.remove();
                }
                
                // Agregar info del usuario
                headerRight.innerHTML = `
                    <li class="nav-item">
                        <span class="nav-link text-info">
                            <i class="fa fa-user"></i> ${user.email} (${user.rol})
                        </span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-danger btn-sm mt-2" onclick="logoutFromCarrito()">
                            Salir
                        </button>
                    </li>
                ` + headerRight.innerHTML;
            }
        }
    }

    function logoutFromCarrito() {
        localStorage.clear();   // elimina todo lo guardado en localStorage
        sessionStorage.clear(); // elimina todo lo guardado en sessionStorage
        window.location.href = "index.html";
    }

    // Ejecutar cuando cargue la página
    document.addEventListener("DOMContentLoaded", checkLoginInCarrito);
</script>


   <!-- CARRITO -->
   <section class="products py-5">
      <div class="container">

         <h2 class="text-center mb-5">Tu Carrito de Compras</h2>

         <div class="table-responsive">
            <table class="table table-bordered text-center">
               <thead class="bg-dark text-white">
                  <tr>
                     <th>Producto</th>
                     <th>Precio</th>
                     <th>Cantidad</th>
                     <th>Subtotal</th>
                     <th>Eliminar</th>
                  </tr>
               </thead>
               <tbody id="cart-items"></tbody>
            </table>
         </div>

         <div class="text-right mt-4">
            <h4>Total: $<span id="cart-total">0</span> COP</h4>
         </div>

         <div class="text-right mt-3">
            <button class="btn btn-danger" onclick="clearCart()">Vaciar Carrito</button>
            <button class="btn btn-info">Finalizar Compra</button>
         </div>

      </div>
   </section>

   <!-- FOOTER -->
   <footer class="bg-dark text-light py-4 text-center">
      <div class="container">
         <h5 class="text-info">QuantumTech</h5>
         <p>Innovación y rendimiento tecnológico.</p>
         <p>© 2026 Todos los derechos reservados</p>
      </div>
   </footer>

   <script>
      function getCart() {
         return JSON.parse(localStorage.getItem("cart")) || [];
      }

      function saveCart(cart) {
         localStorage.setItem("cart", JSON.stringify(cart));
      }

      function renderCart() {
         const cart = getCart();
         const cartTable = document.getElementById("cart-items");
         const totalElement = document.getElementById("cart-total");

         cartTable.innerHTML = "";
         let total = 0;

         cart.forEach((item, index) => {
            const subtotal = item.price * item.quantity;
            total += subtotal;

            cartTable.innerHTML += `
            <tr>
               <td>
                  <img src="${item.image}" alt="${item.name}">
                  <br>
                  ${item.name}
               </td>
               <td>$${item.price.toLocaleString()}</td>
               <td>
                  <button class="btn btn-sm btn-secondary"
                     onclick="changeQuantity(${index}, -1)">-</button>

                  <span class="mx-2">${item.quantity}</span>

                  <button class="btn btn-sm btn-secondary"
                     onclick="changeQuantity(${index}, 1)">+</button>
               </td>
               <td>$${subtotal.toLocaleString()}</td>
               <td>
                  <button class="btn btn-sm btn-danger"
                     onclick="removeItem(${index})">X</button>
               </td>
            </tr>
         `;
         });

         totalElement.textContent = total.toLocaleString();
      }

      function changeQuantity(index, change) {
         let cart = getCart();
         cart[index].quantity += change;

         if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
         }

         saveCart(cart);
         renderCart();
      }

      function removeItem(index) {
         let cart = getCart();
         cart.splice(index, 1);
         saveCart(cart);
         renderCart();
      }

      function clearCart() {
         localStorage.removeItem("cart");
         renderCart();
      }

      renderCart();
   </script>

   <script src="js/jquery.min.js"></script>
   <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
