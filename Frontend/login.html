<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QuantumTech | Iniciar Sesión</title>
    
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
        }
        
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h2 {
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-control {
            height: 45px;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding-left: 40px;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            left: 15px;
            top: 14px;
            color: #999;
            font-size: 16px;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            height: 45px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .alert {
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        
        .demo-credentials {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        
        .demo-credentials p {
            margin-bottom: 5px;
        }
        
        .demo-credentials span {
            color: #667eea;
            font-weight: bold;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <img src="images/logo.png" alt="QuantumTech" style="width: 80px; margin-bottom: 20px;" onerror="this.style.display='none'">
            <h2>QuantumTech</h2>
            <p>Ingresa con tus credenciales</p>
        </div>
        
        <div class="alert alert-danger" id="errorAlert" role="alert">
            <i class="fa fa-exclamation-circle"></i> Usuario o contraseña incorrectos
        </div>
        
        <form id="loginForm">
            <div class="form-group input-icon">
                <i class="fa fa-user"></i>
                <input type="text" class="form-control" id="username" placeholder="Usuario" required autofocus>
            </div>
            
            <div class="form-group input-icon">
                <i class="fa fa-lock"></i>
                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fa fa-sign-in"></i> Iniciar Sesión
            </button>
        </form>
        
        <div class="demo-credentials">
            <p><i class="fa fa-info-circle"></i> Credenciales de prueba:</p>
            <p><span>Administrador:</span> admin / 1234</p>
            <p><span>Cliente:</span> cliente / abcd</p>
        </div>
        
        <div class="footer">
            &copy; 2026 QuantumTech. Todos los derechos reservados.
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            const loginBtn = document.getElementById('loginBtn');
            
            // Usuarios válidos
            const validUsers = [
                { username: 'admin', password: '1234', rol: 'Administrador' },
                { username: 'cliente', password: 'abcd', rol: 'Cliente' }
            ];
            
            // Buscar usuario
            const user = validUsers.find(u => u.username === username && u.password === password);
            
            if (user) {
                // Guardar sesión
                localStorage.setItem('usuario', JSON.stringify({
                    email: user.username,
                    rol: user.rol
                }));
                
                // Mostrar loading en el botón
                loginBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Ingresando...';
                loginBtn.disabled = true;
                
                // Redirigir al index
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                // Mostrar error
                errorAlert.style.display = 'block';
                
                // Ocultar error después de 3 segundos
                setTimeout(() => {
                    errorAlert.style.display = 'none';
                }, 3000);
            }
        });
        
        // Si ya hay sesión activa, redirigir al index
        if (localStorage.getItem('usuario')) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
